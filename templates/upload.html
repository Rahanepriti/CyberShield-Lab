{% extends "base.html" %}

{% block content %}

<h1>📤 Secure File Upload</h1>

<br>

<form method="POST" enctype="multipart/form-data" class="upload-form">

    <input type="file" name="file" required>

    <br><br>

    <button type="submit">Upload File</button>

</form>
{% if message %}

<br>

<p>{{ message }}</p>

{% endif %}

{% endblock %}
